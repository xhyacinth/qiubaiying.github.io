name: Coze Scheduled Task

on:
  schedule:
    # cron 表达式（UTC时间）
    # 每天北京时间9点执行（UTC 1点）
    - cron: '*/5 * * * *'
    # 其他示例：
    # - cron: '0 */6 * * *'  # 每6小时执行
    # - cron: '0 9,18 * * *' # 每天9点和18点执行
  workflow_dispatch:  # 支持手动触发

jobs:
  trigger-coze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install cozepy
      
      - name: Run Coze Task
        env:
          COZE_TOKEN: ${{ secrets.COZE_TOKEN }}
          BOT_ID: ${{ secrets.BOT_ID }}
        run: |
          python scripts/trigger_coze.py
